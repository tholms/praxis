name: Update AUR Package

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Release"]
    types:
      - completed

permissions:
  contents: write

jobs:
  update-aur:
    # Run on a successful Release workflow completion or on manual dispatch.
    # Skip when Release failed/was cancelled so we don't push a stale AUR
    # update on top of a broken release.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    container:
      image: archlinux
      options: --privileged

    steps:
      - name: Install dependencies
        run: pacman -Sy --noconfirm git curl openssh

      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Update AUR files
        id: update_aur
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          SHA256=$(curl -sL "https://github.com/originsec/praxis/archive/v${VERSION}.tar.gz" | sha256sum | cut -d' ' -f1)

          echo "Version: ${VERSION}"
          echo "SHA256: ${SHA256}"

          cd pkg/aur/praxis

          CURRENT_VER=$(grep '^pkgver=' PKGBUILD | cut -d= -f2)
          CURRENT_REL=$(grep '^pkgrel=' PKGBUILD | cut -d= -f2)

          #
          # Temporarily revert PKGBUILD/.SRCINFO to check whether other
          # packaging files (e.g. .install, .env, .service) changed.
          #
          cp PKGBUILD PKGBUILD.stash
          cp .SRCINFO .SRCINFO.stash
          git checkout HEAD -- PKGBUILD .SRCINFO

          if ! git diff --quiet HEAD -- .; then
            PACKAGING_CHANGED=true
          else
            PACKAGING_CHANGED=false
          fi

          mv PKGBUILD.stash PKGBUILD
          mv .SRCINFO.stash .SRCINFO

          #
          # Update pkgver and source tarball sha256sum unconditionally.
          # When the values are unchanged these sed calls are no-ops.
          #
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" PKGBUILD
          sed -i "0,/^    '[a-f0-9]\{64\}'/{s/^    '[a-f0-9]\{64\}'/    '${SHA256}'/}" PKGBUILD
          sed -i "s/pkgver = .*/pkgver = ${VERSION}/" .SRCINFO
          sed -i "s|source = praxis-.*\.tar\.gz::.*|source = praxis-${VERSION}.tar.gz::https://github.com/originsec/praxis/archive/v${VERSION}.tar.gz|" .SRCINFO
          sed -i "0,/sha256sums = [a-f0-9]\{64\}/{s/sha256sums = [a-f0-9]\{64\}/sha256sums = ${SHA256}/}" .SRCINFO

          #
          # If nothing changed (version, checksum and packaging files all
          # identical), there is nothing to publish.
          #
          if [ "$PACKAGING_CHANGED" = false ] && git diff --quiet HEAD -- PKGBUILD .SRCINFO; then
            echo "No AUR packaging changes to publish"
            exit 0
          fi

          #
          # New upstream version  -> pkgrel = 1
          # Same version          -> bump pkgrel
          #
          if [ "$CURRENT_VER" != "$VERSION" ]; then
            NEW_REL=1
            echo "pkgver bump (${CURRENT_VER} -> ${VERSION}); pkgrel=${NEW_REL}"
          else
            NEW_REL=$((CURRENT_REL + 1))
            echo "Packaging changes detected; pkgrel ${CURRENT_REL} -> ${NEW_REL}"
          fi

          sed -i "s/^pkgrel=.*/pkgrel=${NEW_REL}/" PKGBUILD
          sed -i "s/pkgrel = .*/pkgrel = ${NEW_REL}/" .SRCINFO

      - name: Commit to praxis repo
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          git config --global --add safe.directory "$PWD"
          git config user.name "David Kaplan"
          git config user.email "davkaplan@gmail.com"
          git add pkg/aur/praxis/PKGBUILD pkg/aur/praxis/.SRCINFO
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update AUR package to v${VERSION}"
            git push
          fi

      - name: Push to AUR
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        run: |
          mkdir -p /github/home/.ssh /root/.ssh
          printf '%s\n' "${AUR_SSH_KEY}" > /github/home/.ssh/aur
          chmod 600 /github/home/.ssh/aur
          ssh-keyscan -t ed25519,rsa aur.archlinux.org > /github/home/.ssh/known_hosts 2>/dev/null
          chmod 600 /github/home/.ssh/known_hosts
          cat > /github/home/.ssh/config <<'EOF'
          Host aur.archlinux.org
            User aur
            IdentityFile /github/home/.ssh/aur
            IdentitiesOnly yes
            StrictHostKeyChecking yes
            UserKnownHostsFile /github/home/.ssh/known_hosts
            GlobalKnownHostsFile /dev/null
            ConnectTimeout 20
            ServerAliveInterval 15
            ServerAliveCountMax 3
          EOF
          chmod 600 /github/home/.ssh/config
          cp /github/home/.ssh/known_hosts /root/.ssh/known_hosts
          cp /github/home/.ssh/config /root/.ssh/config
          chmod 600 /root/.ssh/known_hosts /root/.ssh/config

          git config --global user.name "David Kaplan"
          git config --global user.email "davkaplan@gmail.com"
          git config --global --add safe.directory "$PWD"

          export GIT_SSH_COMMAND="ssh -F /github/home/.ssh/config -vvv"

          git clone ssh://aur@aur.archlinux.org/praxis.git /tmp/aur-push
          cp pkg/aur/praxis/PKGBUILD pkg/aur/praxis/.SRCINFO /tmp/aur-push/
          cp pkg/aur/praxis/*.service pkg/aur/praxis/*.conf /tmp/aur-push/
          cp pkg/aur/praxis/*.env pkg/aur/praxis/*.install /tmp/aur-push/
          cd /tmp/aur-push
          git add -A
          if git diff --cached --quiet; then
            echo "AUR already up to date"
            exit 0
          fi
          VERSION=$(grep '^pkgver=' PKGBUILD | cut -d= -f2)
          git commit -m "Update to v${VERSION}"
          for i in 1 2 3 4 5; do
            git push && echo "Pushed to AUR" && exit 0
            echo "AUR push failed, retry $i"
            sleep $((i * 15))
          done
          exit 1
