name: Update AUR Package

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-aur:
    runs-on: ubuntu-latest
    container:
      image: archlinux
      options: --privileged

    steps:
      - name: Install dependencies
        run: pacman -Sy --noconfirm git curl openssh

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update AUR files
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          SHA256=$(curl -sL "https://github.com/originsec/praxis/archive/v${VERSION}.tar.gz" | sha256sum | cut -d' ' -f1)

          echo "Version: ${VERSION}"
          echo "SHA256: ${SHA256}"

          cd pkg/aur/praxis
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" PKGBUILD
          sed -i "0,/^    '[a-f0-9]\{64\}'/{s/^    '[a-f0-9]\{64\}'/    '${SHA256}'/}" PKGBUILD
          sed -i "s/pkgver = .*/pkgver = ${VERSION}/" .SRCINFO
          sed -i "s|source = praxis-.*\.tar\.gz::.*|source = praxis-${VERSION}.tar.gz::https://github.com/originsec/praxis/archive/v${VERSION}.tar.gz|" .SRCINFO
          sed -i "0,/sha256sums = [a-f0-9]\{64\}/{s/sha256sums = [a-f0-9]\{64\}/sha256sums = ${SHA256}/}" .SRCINFO

      - name: Commit to praxis repo
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          git config --global --add safe.directory "$PWD"
          git config user.name "David Kaplan"
          git config user.email "davkaplan@gmail.com"
          git add pkg/aur/praxis/PKGBUILD pkg/aur/praxis/.SRCINFO
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update AUR package to v${VERSION}"
            git push
          fi

      - name: Configure SSH for AUR
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${AUR_SSH_KEY}" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan -t ed25519,rsa aur.archlinux.org >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Push to AUR
        run: |
          git config --global user.name "David Kaplan"
          git config --global user.email "davkaplan@gmail.com"
          git config --global --add safe.directory "$PWD"

          export GIT_SSH_COMMAND="ssh -i ~/.ssh/aur -o IdentitiesOnly=yes -o ConnectTimeout=20 -o ServerAliveInterval=15 -o ServerAliveCountMax=3"

          git clone ssh://aur@aur.archlinux.org/praxis.git /tmp/aur-push
          cp pkg/aur/praxis/PKGBUILD pkg/aur/praxis/.SRCINFO /tmp/aur-push/
          cp pkg/aur/praxis/*.service pkg/aur/praxis/*.conf /tmp/aur-push/
          cp pkg/aur/praxis/*.env pkg/aur/praxis/*.install /tmp/aur-push/
          cd /tmp/aur-push
          git add -A
          if git diff --cached --quiet; then
            echo "AUR already up to date"
            exit 0
          fi
          VERSION=$(grep '^pkgver=' PKGBUILD | cut -d= -f2)
          git commit -m "Update to v${VERSION}"
          for i in 1 2 3 4 5; do
            git push && echo "Pushed to AUR" && exit 0
            echo "AUR push failed, retry $i"
            sleep $((i * 15))
          done
          exit 1
