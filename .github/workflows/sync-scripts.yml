name: Sync Install Scripts

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout praxis
        uses: actions/checkout@v5

      - name: Checkout praxis_site
        uses: actions/checkout@v5
        with:
          repository: originsec/praxis_site
          token: ${{ secrets.SITE_DEPLOY_TOKEN }}
          path: praxis_site

      - name: Copy scripts to praxis_site
        run: |
          cp scripts/install.sh praxis_site/public/
          cp scripts/install.ps1 praxis_site/public/
          rm -f praxis_site/public/docker.sh praxis_site/public/docker.ps1

      - name: Commit and push
        working-directory: praxis_site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A public/
          git diff --staged --quiet || git commit -m "Sync install scripts from praxis ${{ github.ref_name }}"
          git push origin main
