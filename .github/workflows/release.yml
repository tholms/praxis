name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-node:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: praxis_node
            asset_name: praxis_node-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: praxis_node.exe
            asset_name: praxis_node-windows-x86_64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --package praxis_node --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

  build-server:
    #
    # Build on ubuntu-22.04 for broad glibc compatibility (glibc 2.35).
    # This is the oldest actively-supported GitHub Actions runner,
    # producing binaries that run on Ubuntu 22.04+, Debian 12+,
    # Fedora 36+, etc.
    #
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build server binaries
        run: cargo build --release -p praxis_service -p praxis_web -p praxis_cli -p praxis_node

      - name: Package binaries
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mkdir -p "praxis-${VERSION}-x86_64-linux"
          cp target/release/praxis_service target/release/praxis_web \
             target/release/praxis_cli target/release/praxis_node \
             "praxis-${VERSION}-x86_64-linux/"
          cp LICENSE "praxis-${VERSION}-x86_64-linux/"
          tar czf "praxis-${VERSION}-x86_64-linux.tar.gz" "praxis-${VERSION}-x86_64-linux"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: praxis-server-linux-x86_64
          path: praxis-*-x86_64-linux.tar.gz

  release:
    needs: [build-node, build-server]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mv artifacts/praxis_node-linux-x86_64/praxis_node praxis_node-linux-x86_64
          mv artifacts/praxis_node-windows-x86_64.exe/praxis_node.exe praxis_node-windows-x86_64.exe
          chmod +x praxis_node-linux-x86_64
          cp artifacts/praxis-server-linux-x86_64/praxis-*-x86_64-linux.tar.gz .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          make_latest: true
          files: |
            praxis_node-linux-x86_64
            praxis_node-windows-x86_64.exe
            praxis-*-x86_64-linux.tar.gz
