name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-node:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: praxis_node
            asset_name: praxis_node-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: praxis_node.exe
            asset_name: praxis_node-windows-x86_64.exe
          - os: macos-26
            target: aarch64-apple-darwin
            artifact_name: praxis_node
            asset_name: praxis_node-macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --package praxis_node --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

  build-node-tiny-c:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_path: node/tiny_c/praxis_node_tiny_c
            asset_name: praxis_node_tiny_c-linux-x86_64
            shell: bash
          - os: macos-26
            artifact_path: node/tiny_c/praxis_node_tiny_c
            asset_name: praxis_node_tiny_c-macos-arm64
            shell: bash
          - os: windows-latest
            artifact_path: node/tiny_c/praxis_node_tiny_c.exe
            asset_name: praxis_node_tiny_c-windows-x86_64.exe
            shell: msys2 {0}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: ${{ matrix.shell }}

    steps:
      - uses: actions/checkout@v5

      - name: Set up MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-make
            make

      - name: Build
        working-directory: node/tiny_c
        run: make release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.artifact_path }}

  build-cli:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: praxis_cli.exe
            asset_name: praxis_cli-windows-x86_64.exe
          - os: macos-26
            target: aarch64-apple-darwin
            artifact_name: praxis_cli
            asset_name: praxis_cli-macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build CLI
        run: cargo build --release --package praxis_cli --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

  build-server:
    #
    # Build on ubuntu-22.04 for broad glibc compatibility (glibc 2.35).
    # This is the oldest actively-supported GitHub Actions runner,
    # producing binaries that run on Ubuntu 22.04+, Debian 12+,
    # Fedora 36+, etc.
    #
    needs: [build-node, build-node-tiny-c]
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build server binaries
        #
        # `praxis_web` is intentionally not built — the installer and
        # AUR packages no longer ship the web server.
        #
        run: cargo build --release -p praxis_service -p praxis_cli -p praxis_node

      - name: Build praxis_node_tiny_c (Linux)
        run: make -C node/tiny_c release

      - name: Download Windows node binary
        uses: actions/download-artifact@v4
        with:
          name: praxis_node-windows-x86_64.exe
          path: artifacts/windows-node

      - name: Download tiny C node (Windows)
        uses: actions/download-artifact@v4
        with:
          name: praxis_node_tiny_c-windows-x86_64.exe
          path: artifacts/windows-node-tiny-c

      - name: Package binaries
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mkdir -p "praxis-${VERSION}-x86_64-linux"
          cp target/release/praxis_service \
             target/release/praxis_cli \
             target/release/praxis_node \
             "praxis-${VERSION}-x86_64-linux/"
          cp node/tiny_c/praxis_node_tiny_c \
             "praxis-${VERSION}-x86_64-linux/praxis_node_tiny_c"
          cp artifacts/windows-node/praxis_node.exe \
             "praxis-${VERSION}-x86_64-linux/praxis_node_windows.exe"
          cp artifacts/windows-node-tiny-c/praxis_node_tiny_c.exe \
             "praxis-${VERSION}-x86_64-linux/praxis_node_tiny_c_windows.exe"
          cp pkg/praxisctl/praxisctl "praxis-${VERSION}-x86_64-linux/"
          cp LICENSE "praxis-${VERSION}-x86_64-linux/"
          tar czf "praxis-${VERSION}-x86_64-linux.tar.gz" "praxis-${VERSION}-x86_64-linux"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: praxis-server-linux-x86_64
          path: praxis-*-x86_64-linux.tar.gz

  release:
    needs: [build-node, build-node-tiny-c, build-server, build-cli]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mv artifacts/praxis_node-linux-x86_64/praxis_node praxis_node-linux-x86_64
          mv artifacts/praxis_node-windows-x86_64.exe/praxis_node.exe praxis_node-windows-x86_64.exe
          mv artifacts/praxis_node-macos-arm64/praxis_node praxis_node-macos-arm64
          mv artifacts/praxis_node_tiny_c-linux-x86_64/praxis_node_tiny_c praxis_node_tiny_c-linux-x86_64
          mv artifacts/praxis_node_tiny_c-macos-arm64/praxis_node_tiny_c praxis_node_tiny_c-macos-arm64
          mv artifacts/praxis_node_tiny_c-windows-x86_64.exe/praxis_node_tiny_c.exe praxis_node_tiny_c-windows-x86_64.exe
          mv artifacts/praxis_cli-windows-x86_64.exe/praxis_cli.exe praxis_cli-windows-x86_64.exe
          mv artifacts/praxis_cli-macos-arm64/praxis_cli praxis_cli-macos-arm64
          chmod +x praxis_node-linux-x86_64 praxis_node-macos-arm64 \
                   praxis_node_tiny_c-linux-x86_64 praxis_node_tiny_c-macos-arm64 \
                   praxis_cli-macos-arm64
          cp artifacts/praxis-server-linux-x86_64/praxis-*-x86_64-linux.tar.gz .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          make_latest: true
          files: |
            praxis_node-linux-x86_64
            praxis_node-windows-x86_64.exe
            praxis_node-macos-arm64
            praxis_node_tiny_c-linux-x86_64
            praxis_node_tiny_c-macos-arm64
            praxis_node_tiny_c-windows-x86_64.exe
            praxis_cli-windows-x86_64.exe
            praxis_cli-macos-arm64
            praxis-*-x86_64-linux.tar.gz
