#
# Praxis Docker Compose configuration.
#
# Bundles RabbitMQ + the Praxis container. The Praxis container
# runs systemd as PID 1 so `praxisctl` works the same way it does
# on a native Linux install:
#
#   docker compose exec praxis praxisctl status
#   docker compose exec praxis praxisctl set-rabbitmqurl <url>
#
# Access:
#   MCP Server:          http://localhost:8585/sse
#   Claude Bridge CCRv1: ws://localhost:8586
#   Claude Bridge CCRv2: http://localhost:8587
#   RabbitMQ Management: http://localhost:15672 (praxis/praxis)
#

services:
  rabbitmq:
    image: rabbitmq:3-management
    hostname: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: praxis
      RABBITMQ_DEFAULT_PASS: praxis
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  postgres:
    image: postgres:16-alpine
    hostname: postgres
    environment:
      POSTGRES_USER: praxis
      POSTGRES_PASSWORD: praxis_db_2024
      POSTGRES_DB: praxis
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U praxis"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    profiles:
      - postgres

  praxis:
    build:
      context: .
      args:
        PRAXIS_VERSION: ${PRAXIS_VERSION:-0.9.27}
    depends_on:
      rabbitmq:
        condition: service_healthy
    #
    # systemd as PID 1 needs cgroup access + a few writable tmpfs mounts.
    # `cgroup: host` works for both cgroupv1 and cgroupv2 hosts.
    #
    cgroup: host
    privileged: true
    tmpfs:
      - /tmp
      - /run
      - /run/lock
    volumes:
      - praxis_data:/var/lib/praxis
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    environment:
      RUST_LOG: info
    ports:
      - "${PRAXIS_MCP_PORT:-8585}:${PRAXIS_MCP_PORT:-8585}"
      - "8586:8586"
      - "8587:8587"
    restart: unless-stopped

  praxis-postgres:
    build:
      context: .
      args:
        PRAXIS_VERSION: ${PRAXIS_VERSION:-0.9.27}
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    cgroup: host
    privileged: true
    tmpfs:
      - /tmp
      - /run
      - /run/lock
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    environment:
      RUST_LOG: info
    ports:
      - "${PRAXIS_MCP_PORT:-8585}:${PRAXIS_MCP_PORT:-8585}"
      - "8586:8586"
      - "8587:8587"
    restart: unless-stopped
    profiles:
      - postgres

volumes:
  rabbitmq_data:
  postgres_data:
  praxis_data:
