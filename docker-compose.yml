#
# Praxis Docker Compose Configuration
# Includes RabbitMQ and Praxis services with optional PostgreSQL.
#
# Usage:
#   docker compose up --build                    # SQLite (default)
#   docker compose --profile postgres up --build # PostgreSQL
#
# Access:
#   Web UI: http://localhost:8080
#   MCP Server: http://localhost:8585/sse (enabled by default)
#   Claude Bridge CCRv1: ws://localhost:8586 (disabled by default)
#   Claude Bridge CCRv2: http://localhost:8587 (disabled by default)
#   RabbitMQ Management: http://localhost:15672 (praxis/praxis)
#
# Environment Variables:
#   PRAXIS_DATABASE_URL - Database connection URL
#                         Default: ~/.praxis_operations.db (SQLite)
#   PRAXIS_RABBITMQ_URL - RabbitMQ connection URL
#                         Default: amqp://praxis:praxis@localhost:5672
#   PRAXIS_NOT_HIDDEN=1 - Disable hidden desktop for agent windows (Windows only)
#                         Useful for debugging/testing DevTools-based agents
#   SKIP_NODE_BUILD=1   - Skip building praxis_node binaries (faster builds)
#   PRAXIS_HEADLESS=1   - Run without web UI (service + RabbitMQ only)
#   PRAXIS_MCP_PORT     - MCP server port (default: 8585)
#   CARGO_PROFILE       - Cargo build profile (default: release)
#                         Set to release-fast for faster builds with thin LTO
#

services:
  rabbitmq:
    image: rabbitmq:3-management
    hostname: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: praxis
      RABBITMQ_DEFAULT_PASS: praxis
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  postgres:
    image: postgres:16-alpine
    hostname: postgres
    environment:
      POSTGRES_USER: praxis
      POSTGRES_PASSWORD: praxis_db_2024
      POSTGRES_DB: praxis
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U praxis"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    profiles:
      - postgres

  praxis:
    build:
      context: .
      args:
        SKIP_NODE_BUILD: ${SKIP_NODE_BUILD:-0}
        SKIP_WEB_BUILD: ${PRAXIS_HEADLESS:-0}
        CARGO_PROFILE: ${CARGO_PROFILE:-release}
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      PRAXIS_RABBITMQ_URL: amqp://praxis:praxis@rabbitmq:5672
      PRAXIS_DATABASE_URL: /app/data/praxis_operations.db
      PRAXIS_HEADLESS: ${PRAXIS_HEADLESS:-0}
      RUST_LOG: info
    ports:
      - "8080:8080"
      - "${PRAXIS_MCP_PORT:-8585}:${PRAXIS_MCP_PORT:-8585}"
      - "8586:8586"
      - "8587:8587"
    volumes:
      - praxis_data:/app/data
    restart: unless-stopped

  praxis-postgres:
    build:
      context: .
      args:
        SKIP_NODE_BUILD: ${SKIP_NODE_BUILD:-0}
        SKIP_WEB_BUILD: ${PRAXIS_HEADLESS:-0}
        CARGO_PROFILE: ${CARGO_PROFILE:-release}
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      PRAXIS_RABBITMQ_URL: amqp://praxis:praxis@rabbitmq:5672
      PRAXIS_DATABASE_URL: postgresql://praxis:praxis_db_2024@postgres:5432/praxis
      PRAXIS_HEADLESS: ${PRAXIS_HEADLESS:-0}
      RUST_LOG: info
    ports:
      - "8080:8080"
      - "${PRAXIS_MCP_PORT:-8585}:${PRAXIS_MCP_PORT:-8585}"
      - "8586:8586"
      - "8587:8587"
    restart: unless-stopped
    profiles:
      - postgres

volumes:
  rabbitmq_data:
  postgres_data:
  praxis_data:
